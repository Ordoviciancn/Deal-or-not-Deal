name: Build Flutter APK

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "flutter_android/**"
      - ".github/workflows/build-flutter-apk.yml"

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter doctor
        working-directory: flutter_android
        run: flutter doctor -v

      - name: Install dependencies
        working-directory: flutter_android
        run: flutter pub get

      - name: Analyze
        working-directory: flutter_android
        run: flutter analyze

      - name: Run tests
        working-directory: flutter_android
        run: flutter test

      - name: Build release APK
        working-directory: flutter_android
        run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: ticket-deal-release-apk
          path: flutter_android/build/app/outputs/flutter-apk/app-release.apk
